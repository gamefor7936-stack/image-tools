<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="utf-8"/>
<title>QR code Generator - MARK_Tools</title>
<meta name="description" content="Generate high-definition QR Codes for links or text with a custom center logo. Free, secure, and ready for professional printing.">
<link rel="icon" type="image/png" href="../favicon.png">
<link rel="apple-touch-icon" href="../favicon.png">
<meta property="og:image" content="https://marktoolbox.com/favicon.png">
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<script src="../js/history.js"></script>
</head>
<body class="bg-gray-50 p-6">
<div class="max-w-xl mx-auto">
<a class="text-blue-500 text-sm mb-4 inline-block" href="/">← Back to home</a>
<div class="bg-white p-6 rounded-xl shadow-md border border-gray-100">
<div class="mb-4 text-indigo-600 font-bold text-2xl">QR</div>
<h3 class="text-xl font-semibold mb-2 text-gray-800">QR Code Generator</h3>
<input class="w-full p-2 border rounded text-sm mb-4 outline-none focus:ring-2 focus:ring-indigo-400" id="qrText" placeholder="URL or text" type="text"/>
<div class="flex justify-center mb-4 p-2 bg-white inline-block mx-auto" id="qrcode"></div>
<div class="mb-4">
<label class="text-[10px] font-bold text-gray-400 block mb-1 uppercase">Center logo (optional)</label>
<input accept="image/*" class="w-full text-xs" id="qrLogoInput" onchange="generateQR()" type="file"/>
</div>
<div class="flex gap-2">
<button class="flex-1 bg-indigo-600 text-white py-2 rounded-lg font-bold hover:bg-indigo-700" onclick="generateQR()">Generate</button>
<button class="flex-1 bg-gray-200 text-gray-700 py-2 rounded-lg font-bold hover:bg-gray-300 hidden" id="dlQR" onclick="downloadQR()">Download</button>
</div>
</div>
<section class="mt-12">
<div class="flex items-center gap-2 mb-4 px-4">
<svg class="h-5 w-5 text-slate-400" fill="none" stroke="currentColor" viewbox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"></path></svg>
<h3 class="font-bold text-slate-700">Recent history</h3>
</div>
<div class="bg-white p-6 rounded-3xl border border-slate-200 shadow-sm" id="historyList">
</div>
</section>
</div>
<script>
        function generateQR() {
        const text = document.getElementById('qrText').value;
        const logoInput = document.getElementById('qrLogoInput');
        const container = document.getElementById('qrcode');
        container.innerHTML = "";

        const tempDiv = document.createElement('div');
        new QRCode(tempDiv, { text: text, width: 512, height: 512 });

        setTimeout(() => {
            const qrImg = tempDiv.querySelector('img');
            const canvas = document.createElement('canvas');
            canvas.width = 512; canvas.height = 512;
            const ctx = canvas.getContext('2d');

            ctx.drawImage(qrImg, 0, 0);

            if (logoInput.files[0]) {
                const reader = new FileReader();
                reader.onload = (e) => {
                    const logo = new Image();
                    logo.src = e.target.result;
                    logo.onload = () => {
                        const size = 120;
                        ctx.fillStyle = "white";
                        ctx.fillRect(256 - size/2 - 5, 256 - size/2 - 5, size + 10, size + 10);
                        ctx.drawImage(logo, 256 - size/2, 256 - size/2, size, size);
                        
                        const finalImg = document.createElement('img');
                        finalImg.src = canvas.toDataURL();
                        container.appendChild(finalImg);
                        document.getElementById('dlQR').classList.remove('hidden');
                    }
                }
                reader.readAsDataURL(logoInput.files[0]);
            } else {
                container.appendChild(qrImg);
                document.getElementById('dlQR').classList.remove('hidden');
            }
        }, 100);
    }

    async function downloadQR() {
        const img = document.querySelector('#qrcode img');
        const fileName = 'QRCode.png';
        
        const response = await fetch(img.src);
        const blob = await response.blob();
        if (typeof addToHistory === 'function') {
            const historyId = await addToHistory('QR Code Generator', fileName, blob);
            window.location.href = `../go.html?id=${historyId}`;
        } else {
            saveFile(URL.createObjectURL(blob), fileName);
        }
    }

    window.onload = () => {
        renderHistoryUI('QR Code Generator');
    };
    </script>
<script src="../js/main.js"></script></body>
</html>
