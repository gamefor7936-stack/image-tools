<!DOCTYPE html>
<html lang="en" class="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Global DNS Propagation Checker & Resolver</title>
    <meta name="description" content="Check DNS propagation globally. Instantly verify A, AAAA, CNAME, MX, and TXT records across multiple DNS servers worldwide.">
    <link rel="icon" type="image/png" href="../favicon.png">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="../js/main.js"></script>
    <script src="../js/history.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.25/jspdf.plugin.autotable.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/docx@8.5.0/build/index.umd.js"></script>

    <script>
        tailwind.config = { darkMode: 'class', theme: { extend: { colors: { darkBg: '#0f172a', darkCard: '#1e293b', darkBorder: '#334155' } } } }
        if (localStorage.theme === 'dark' || (!('theme' in localStorage) && window.matchMedia('(prefers-color-scheme: dark)').matches)) { document.documentElement.classList.add('dark'); } else { document.documentElement.classList.remove('dark'); }
    </script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&family=JetBrains+Mono:wght@600&display=swap');
        body { font-family: 'Inter', sans-serif; transition: background-color 0.3s; }
        .font-mono { font-family: 'JetBrains Mono', monospace; }
        .spin-slow { animation: spin 2s linear infinite; }
        .status-cell { transition: all 0.3s ease; }
    </style>
</head>
<body class="bg-[#f8fafc] dark:bg-darkBg text-slate-900 dark:text-slate-300 min-h-screen flex flex-col">

    <nav class="bg-white/80 dark:bg-darkBg/80 backdrop-blur-lg sticky top-0 z-50 border-b border-slate-200 dark:border-darkBorder shadow-sm">
        <div class="container mx-auto px-6 h-16 flex justify-between items-center max-w-7xl">
            <a href="../index.html" class="flex items-center gap-2 group">
                <div class="w-8 h-8 bg-blue-600 rounded-lg flex items-center justify-center shadow-md">
                    <span class="text-white font-black text-sm">M</span>
                </div>
                <h1 class="text-xl font-black tracking-tighter text-slate-800 dark:text-white">MARK_Tools</h1>
            </a>
            <a class="text-xs font-bold text-slate-500 dark:text-slate-400 hover:text-blue-600" href="../index.html">← BACK</a>
        </div>
    </nav>

    <main class="container mx-auto px-4 py-12 max-w-6xl flex-grow">
        
        <!-- HEADER & INPUT -->
        <div class="text-center mb-10">
            <h1 class="text-3xl md:text-4xl font-black text-slate-800 dark:text-white mb-3 tracking-tight">Global DNS Checker</h1>
            <p class="text-slate-500 dark:text-slate-400 text-sm max-w-2xl mx-auto">Check DNS propagation across multiple global servers instantly. Verify A, MX, TXT, and CNAME records worldwide.</p>
        </div>

        <div class="bg-white dark:bg-darkCard p-4 md:p-6 rounded-3xl shadow-xl border border-slate-200 dark:border-darkBorder max-w-4xl mx-auto mb-10">
            <div class="flex flex-col md:flex-row gap-4">
                <div class="flex-grow">
                    <label class="block text-[10px] font-bold text-slate-400 uppercase tracking-widest mb-2 px-2">Domain Name</label>
                    <input type="text" id="domainInput" class="w-full p-4 rounded-xl bg-slate-50 dark:bg-slate-900/50 border border-slate-200 dark:border-slate-700 outline-none focus:border-blue-500 font-medium text-lg" placeholder="example.com" onkeydown="if(event.key === 'Enter') startDNSCheck()">
                </div>
                <div class="w-full md:w-48">
                    <label class="block text-[10px] font-bold text-slate-400 uppercase tracking-widest mb-2 px-2">Record Type</label>
                    <select id="recordType" class="w-full p-4 rounded-xl bg-slate-50 dark:bg-slate-900/50 border border-slate-200 dark:border-slate-700 outline-none focus:border-blue-500 font-bold cursor-pointer">
                        <option value="A">A</option>
                        <option value="AAAA">AAAA</option>
                        <option value="CNAME">CNAME</option>
                        <option value="MX">MX</option>
                        <option value="TXT">TXT</option>
                        <option value="NS">NS</option>
                    </select>
                </div>
                <div class="w-full md:w-auto flex items-end">
                    <button onclick="startDNSCheck()" id="btnSearch" class="w-full md:w-32 bg-blue-600 hover:bg-blue-700 text-white p-4 rounded-xl font-black uppercase tracking-widest shadow-lg transition-all h-[60px]">
                        Search
                    </button>
                </div>
            </div>
        </div>

        <!-- PROGRESS BAR -->
        <div id="progressContainer" class="max-w-4xl mx-auto mb-8 hidden">
            <div class="flex justify-between text-xs font-bold text-slate-500 mb-2 uppercase tracking-widest">
                <span>Querying Global Servers...</span>
                <span id="progressText">0/0</span>
            </div>
            <div class="w-full bg-slate-200 dark:bg-slate-700 rounded-full h-2 overflow-hidden">
                <div id="progressBar" class="bg-blue-600 h-2 rounded-full transition-all duration-300" style="width: 0%"></div>
            </div>
        </div>

        <!-- EXPORT BUTTONS -->
        <div id="exportArea" class="max-w-4xl mx-auto mb-6 flex justify-end gap-3 hidden animate-fade-in">
            <button onclick="exportReport('pdf')" class="bg-emerald-600 hover:bg-emerald-500 text-white px-6 py-2 rounded-lg font-bold text-xs shadow-md flex items-center gap-2">📄 Export PDF</button>
            <button onclick="exportReport('word')" class="bg-blue-600 hover:bg-blue-500 text-white px-6 py-2 rounded-lg font-bold text-xs shadow-md flex items-center gap-2">📝 Export Word</button>
        </div>

        <!-- RESULTS TABLE (DNSChecker Style) -->
        <div id="resultsTable" class="max-w-4xl mx-auto bg-white dark:bg-darkCard rounded-2xl shadow-sm border border-slate-200 dark:border-darkBorder overflow-hidden hidden animate-fade-in">
            <div class="overflow-x-auto">
                <table class="w-full text-left border-collapse">
                    <thead>
                        <tr class="bg-slate-50 dark:bg-slate-800/50 border-b border-slate-200 dark:border-slate-700 text-xs uppercase tracking-widest text-slate-500">
                            <th class="p-4 font-bold">Location / Server</th>
                            <th class="p-4 font-bold text-center w-24">Status</th>
                            <th class="p-4 font-bold">Resolved Record</th>
                        </tr>
                    </thead>
                    <tbody id="serverList" class="text-sm">
                        <!-- Server rows will be injected here -->
                    </tbody>
                </table>
            </div>
        </div>

    </main>

    <script>
        // DAFTAR SERVER GLOBAL (Menggunakan DOH Public API)
        const globalServers =[
            { id: "g1", flag: "🇺🇸", loc: "Google (US)", url: "https://dns.google/resolve" },
            { id: "c1", flag: "🌐", loc: "Cloudflare (Global)", url: "https://cloudflare-dns.com/dns-query" },
            { id: "q1", flag: "🇨🇭", loc: "Quad9 (Switzerland)", url: "https://dns.quad9.net:5053/dns-query" },
            { id: "a1", flag: "🇨🇳", loc: "AliDNS (China)", url: "https://dns.alidns.com/resolve" },
            { id: "m1", flag: "🇸🇪", loc: "Mullvad (Sweden)", url: "https://doh.mullvad.net/dns-query" },
            { id: "g2", flag: "🇬🇧", loc: "Google (Europe Backup)", url: "https://dns.google/resolve" },
            { id: "c2", flag: "🇦🇺", loc: "Cloudflare (AP Backup)", url: "https://cloudflare-dns.com/dns-query" }
        ];

        let completedQueries = 0;
        let exportData =[];
        let currentDomain = "";
        let currentType = "";

        // Header wajib untuk beberapa layanan DoH
        const fetchOptions = {
            method: 'GET',
            headers: { 'Accept': 'application/dns-json' }
        };

        window.onload = () => {
            const savedState = sessionStorage.getItem('dnsState');
            if (savedState) {
                const state = JSON.parse(savedState);
                document.getElementById('domainInput').value = state.domain;
                document.getElementById('recordType').value = state.type;
            }
        };

        function startDNSCheck() {
            let domain = document.getElementById('domainInput').value.trim();
            domain = domain.replace(/^(?:https?:\/\/)?(?:www\.)?/i, "").split('/')[0];
            document.getElementById('domainInput').value = domain;
            
            const type = document.getElementById('recordType').value;

            if (!domain) return alert("Please enter a valid domain.");

            // Reset UI
            sessionStorage.setItem('dnsState', JSON.stringify({ domain, type }));
            currentDomain = domain; currentType = type;
            completedQueries = 0;
            exportData =[];
            
            document.getElementById('btnSearch').disabled = true;
            document.getElementById('progressContainer').classList.remove('hidden');
            document.getElementById('exportArea').classList.add('hidden');
            document.getElementById('resultsTable').classList.remove('hidden');
            
            const tbody = document.getElementById('serverList');
            tbody.innerHTML = "";

            // Buat baris tabel kosong untuk tiap server (Status: Loading)
            globalServers.forEach(server => {
                tbody.innerHTML += `
                    <tr id="row-${server.id}" class="border-b border-slate-100 dark:border-slate-800 status-cell">
                        <td class="p-4 font-medium flex items-center gap-3">
                            <span class="text-xl">${server.flag}</span>
                            <span>${server.loc}</span>
                        </td>
                        <td class="p-4 text-center">
                            <svg class="w-5 h-5 mx-auto text-blue-500 spin-slow" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"/></svg>
                        </td>
                        <td class="p-4 font-mono text-xs text-slate-400" id="res-${server.id}">Checking...</td>
                    </tr>
                `;
            });

            updateProgress();

            // Eksekusi Fetch (Concurrent / Bersamaan)
            globalServers.forEach(server => fetchDNS(server, domain, type));
        }

        async function fetchDNS(server, domain, type) {
            const url = `${server.url}?name=${domain}&type=${type}`;
            const resultCell = document.getElementById(`res-${server.id}`);
            const rowCell = document.getElementById(`row-${server.id}`);

            try {
                // Tambahkan timeout 5 detik agar tidak menggantung
                const controller = new AbortController();
                const timeoutId = setTimeout(() => controller.abort(), 5000);
                
                const response = await fetch(url, { ...fetchOptions, signal: controller.signal });
                clearTimeout(timeoutId);
                
                const data = await response.json();
                
                if (data.Status === 0 && data.Answer) {
                    // SUKSES DITEMUKAN
                    const answers = data.Answer.map(a => a.data).join('<br>');
                    const cleanAnswers = data.Answer.map(a => a.data).join(', '); // Untuk PDF
                    
                    resultCell.innerHTML = `<span class="text-slate-800 dark:text-slate-200">${answers}</span>`;
                    setStatusIcon(server.id, 'success');
                    exportData.push([server.loc, '✅ OK', cleanAnswers]);
                } else if (data.Status === 3 || !data.Answer) {
                    // TIDAK ADA RECORD
                    resultCell.innerHTML = `<span class="text-slate-400">Record not found</span>`;
                    setStatusIcon(server.id, 'cross');
                    exportData.push([server.loc, '❌ Not Found', '-']);
                } else {
                    throw new Error("Server Error");
                }
            } catch (error) {
                resultCell.innerHTML = `<span class="text-red-400">Timeout / Blocked</span>`;
                setStatusIcon(server.id, 'cross');
                exportData.push([server.loc, '❌ Error', 'Timeout']);
            }

            completedQueries++;
            updateProgress();
        }

        function setStatusIcon(id, status) {
            const td = document.querySelector(`#row-${id} td:nth-child(2)`);
            if (status === 'success') {
                td.innerHTML = `<svg class="w-6 h-6 mx-auto text-emerald-500" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="3"><path stroke-linecap="round" stroke-linejoin="round" d="M5 13l4 4L19 7" /></svg>`;
                document.getElementById(`row-${id}`).classList.add('bg-emerald-50/30', 'dark:bg-emerald-900/10');
            } else {
                td.innerHTML = `<svg class="w-6 h-6 mx-auto text-red-500" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="3"><path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12" /></svg>`;
                document.getElementById(`row-${id}`).classList.add('bg-red-50/30', 'dark:bg-red-900/10');
            }
        }

        function updateProgress() {
            const total = globalServers.length;
            const percent = (completedQueries / total) * 100;
            
            document.getElementById('progressBar').style.width = percent + "%";
            document.getElementById('progressText').innerText = `${completedQueries}/${total}`;

            if (completedQueries === total) {
                document.getElementById('btnSearch').disabled = false;
                setTimeout(() => {
                    document.getElementById('progressContainer').classList.add('hidden');
                    document.getElementById('exportArea').classList.remove('hidden');
                }, 1000);
            }
        }

        // --- EXPORT PDF & WORD ---
        async function exportReport(format) {
            if (exportData.length === 0) return;
            try {
                let finalBlob, finalFileName;

                if (format === 'pdf') {
                    const { jsPDF } = window.jspdf;
                    const doc = new jsPDF('p', 'mm', 'a4'); 
                    doc.setFont("helvetica", "bold").setFontSize(18);
                    doc.text("DNS PROPAGATION REPORT", 14, 20);
                    doc.setFontSize(10).setFont("helvetica", "normal");
                    doc.text(`Domain: ${currentDomain} | Type: ${currentType}`, 14, 30);
                    doc.text(`Date: ${new Date().toLocaleString()}`, 14, 36);

                    doc.autoTable({
                        startY: 45, head: [['Location / Server', 'Status', 'Resolved Record']],
                        body: exportData, theme: 'grid', styles: { fontSize: 9 }
                    });
                    finalBlob = doc.output('blob');
                    finalFileName = `DNS_${currentDomain}_${currentType}.pdf`;

                } else if (format === 'word') {
                    const tableRows = [
                        new window.docx.TableRow({ tableHeader: true, children:['Location', 'Status', 'Record Data'].map(text => new window.docx.TableCell({ children:[new window.docx.Paragraph({text: text, bold: true})] })) }),
                        ...exportData.map(row => new window.docx.TableRow({ children: row.map(text => new window.docx.TableCell({ children:[new window.docx.Paragraph(text.toString())] })) }))
                    ];
                    const docWord = new window.docx.Document({
                        sections:[{ children:[
                            new window.docx.Paragraph({ children:[new window.docx.TextRun({ text: "DNS PROPAGATION REPORT", bold: true, size: 28 })] }),
                            new window.docx.Paragraph({ text: `Domain: ${currentDomain} | Type: ${currentType}` }),
                            new window.docx.Table({ width: { size: 100, type: window.docx.WidthType.PERCENTAGE }, rows: tableRows })
                        ]}]
                    });
                    finalBlob = await window.docx.Packer.toBlob(docWord);
                    finalFileName = `DNS_${currentDomain}_${currentType}.docx`;
                }

                if(typeof addToHistory === 'function') await processRedirect('DNS Checker', finalFileName, finalBlob);

            } catch(e) { alert("Export failed: " + e.message); }
        }
    </script>
</body>
</html>
