<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Global DNS Resolver - MARK_Tools</title>
    <meta name="description" content="Global DNS Resolver tool. Perform fast A, MX, TXT, CNAME, and NS record lookups using secure DNS-over-HTTPS. Generates professional audit reports.">
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24'%3E%3Crect width='24' height='24' rx='6' fill='%232563eb'/%3E%3Cpath d='M4 19V5l8 8 8-8v14' stroke='white' stroke-width='3' stroke-linecap='round' stroke-linejoin='round'/%3E%3C/svg%3E">
    
    <!-- Framework & Libraries -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="../js/main.js"></script>
    <script src="../js/history.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.25/jspdf.plugin.autotable.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/docx@8.5.0/build/index.umd.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700;800&family=Inter:wght@400;600;700&display=swap');
        .font-mono { font-family: 'JetBrains Mono', monospace; }
        .font-sans { font-family: 'Inter', sans-serif; }
        
        .term-input { background: #0f172a; border: 1px solid #334155; color: #38bdf8; font-family: 'JetBrains Mono', monospace; transition: all 0.3s; }
        .term-input:focus { border-color: #38bdf8; box-shadow: 0 0 10px rgba(56, 189, 248, 0.2); outline: none; }
        .glass-dark { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.05); }
        
        /* Terminal Output Style */
        .terminal-output { background: #020617; border: 1px solid #1e293b; color: #e2e8f0; font-family: 'JetBrains Mono', monospace; }
    </style>
</head>
<body class="bg-[#0b1120] text-slate-300 font-sans min-h-screen flex flex-col">

    <!-- Navbar Dark -->
    <nav class="bg-[#0f172a]/80 backdrop-blur-md sticky top-0 z-50 border-b border-slate-800">
        <div class="container mx-auto px-6 h-16 flex justify-between items-center">
            <div class="flex items-center gap-3">
                <a href="/" class="text-blue-400 font-black text-xl tracking-tighter hover:opacity-80">MARK_Tools</a>
                <span class="text-slate-600">|</span>
                <span class="text-xs font-bold text-slate-400 uppercase tracking-widest">Network & Dev</span>
            </div>
            <a href="/" class="text-xs font-bold text-slate-400 hover:text-blue-400 transition">BACK TO HOME</a>
        </div>
    </nav>

    <main class="container mx-auto px-4 py-8 flex-grow flex flex-col lg:flex-row gap-6">
        
        <!-- LEFT COLUMN: INPUT & CONTROLS -->
        <div class="w-full lg:w-1/3 flex flex-col gap-6">
            
            <div class="glass-dark p-6 rounded-2xl">
                <div class="flex items-center gap-3 mb-6">
                    <div class="w-10 h-10 bg-blue-500/20 text-blue-400 rounded-lg flex items-center justify-center">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M21 12a9 9 0 01-9 9m9-9a9 9 0 00-9-9m9 9c1.657 0 3-4.03 3-9s-1.343-9-3-9m0 18c-1.657 0-3-4.03-3-9s1.343-9 3-9m-9 9a9 9 0 019-9" /></svg>
                    </div>
                    <div>
                        <h1 class="text-lg font-bold text-white">Global DNS Resolver</h1>
                        <p class="text-[10px] text-slate-400 uppercase tracking-widest">DNS Records Lookup Tool</p>
                    </div>
                </div>

                <div class="space-y-5">
                    <div>
                        <label class="block text-[10px] font-bold text-slate-400 uppercase tracking-widest mb-2">Domain Name</label>
                        <input type="text" id="domainInput" value="google.com" class="w-full p-3 rounded-lg term-input text-sm text-center" placeholder="example.com" onkeydown="if(event.key === 'Enter') resolveDNS()">
                    </div>

                    <div>
                        <label class="block text-[10px] font-bold text-slate-400 uppercase tracking-widest mb-2">Record Type</label>
                        <select id="recordType" class="w-full p-3 rounded-lg term-input text-sm appearance-none text-center" onchange="resolveDNS()">
                            <option value="A">A (IPv4 Address)</option>
                            <option value="AAAA">AAAA (IPv6 Address)</option>
                            <option value="MX">MX (Mail Exchange)</option>
                            <option value="TXT">TXT (Text Records / SPF)</option>
                            <option value="CNAME">CNAME (Canonical Name)</option>
                            <option value="NS">NS (Name Servers)</option>
                            <option value="SOA">SOA (Start of Authority)</option>
                            <option value="ANY">ANY (All Records)</option>
                        </select>
                    </div>

                    <button onclick="resolveDNS()" id="btnResolve" class="w-full bg-blue-600 hover:bg-blue-500 text-white py-3 rounded-xl font-black uppercase tracking-widest transition shadow-lg shadow-blue-900/50">
                        Resolve DNS
                    </button>
                </div>
            </div>

            <!-- Export Buttons -->
            <div class="flex gap-3">
                <button onclick="exportReport('pdf')" id="btnExportPdf" class="flex-1 bg-emerald-600 hover:bg-emerald-500 text-slate-900 py-3 rounded-xl font-black uppercase text-xs tracking-widest transition shadow-lg shadow-emerald-900/50 flex flex-col items-center justify-center gap-1 disabled:opacity-50">
                    <span class="text-lg">📄</span> Export PDF
                </button>
                <button onclick="exportReport('word')" id="btnExportWord" class="flex-1 bg-indigo-600 hover:bg-indigo-500 text-white py-3 rounded-xl font-black uppercase text-xs tracking-widest transition shadow-lg shadow-indigo-900/50 flex flex-col items-center justify-center gap-1 disabled:opacity-50">
                    <span class="text-lg">📝</span> Export Word
                </button>
            </div>
            
            <!-- Area Histori Lokal -->
            <div class="glass-dark p-4 rounded-xl">
                <h4 class="text-[10px] font-bold text-slate-400 uppercase tracking-widest mb-3">Histori Pencarian</h4>
                <div id="historyList" class="space-y-2 max-h-40 overflow-y-auto pr-1"></div>
            </div>

        </div>

        <!-- RIGHT COLUMN: QUERY RESULT (TERMINAL UI) -->
        <div class="w-full lg:w-2/3 glass-dark rounded-2xl p-4 md:p-6 flex flex-col relative overflow-hidden">
            
            <div class="flex items-center gap-2 mb-4 border-b border-slate-700 pb-4">
                <div class="w-3 h-3 rounded-full bg-red-500"></div>
                <div class="w-3 h-3 rounded-full bg-yellow-500"></div>
                <div class="w-3 h-3 rounded-full bg-green-500"></div>
                <span class="ml-2 text-xs font-mono text-slate-500">root@mark-tools:~# dig <span id="termTitle">google.com A</span></span>
            </div>

            <!-- Terminal Output Area -->
            <div id="terminalOutput" class="terminal-output flex-grow rounded-lg p-4 overflow-y-auto whitespace-pre-wrap text-[11px] md:text-xs leading-relaxed">
                <!-- Data will be injected here -->
<span class="text-slate-500">Waiting for query...</span>
            </div>

            <!-- Loading Spinner Overlay -->
            <div id="loadingOverlay" class="hidden absolute inset-0 bg-[#0b1120]/80 backdrop-blur-sm flex items-center justify-center z-10">
                <div class="animate-spin rounded-full h-12 w-12 border-4 border-blue-500 border-t-transparent"></div>
            </div>

        </div>
    </main>

    <script>
        // DNS Record Type Mapping (Google DoH API uses integers)
        const typeMap = {
            1: 'A', 2: 'NS', 5: 'CNAME', 6: 'SOA', 15: 'MX', 16: 'TXT', 28: 'AAAA'
        };

        // Data global untuk Export
        let lastQueryResult =[];
        let lastDomain = "";
        let lastType = "";

        window.onload = () => {
            const savedState = sessionStorage.getItem('dnsState');
            if (savedState) {
                const state = JSON.parse(savedState);
                document.getElementById('domainInput').value = state.domain;
                document.getElementById('recordType').value = state.type;
            }
            if(typeof renderHistoryUI === 'function') renderHistoryUI('DNS Lookup');
            
            // Auto resolve on load if we have a domain
            if(document.getElementById('domainInput').value) resolveDNS();
        };

        async function resolveDNS() {
            let domain = document.getElementById('domainInput').value.trim();
            const type = document.getElementById('recordType').value;
            const terminal = document.getElementById('terminalOutput');
            const loading = document.getElementById('loadingOverlay');
            const termTitle = document.getElementById('termTitle');

            // Remove http:// or https:// if user copies full URL
            domain = domain.replace(/^(?:https?:\/\/)?(?:www\.)?/i, "").split('/')[0];
            document.getElementById('domainInput').value = domain;

            if (!domain) return alert("Enter domain name!");

            // Save State
            sessionStorage.setItem('dnsState', JSON.stringify({ domain, type }));
            termTitle.innerText = `${domain} ${type}`;
            
            loading.classList.remove('hidden');
            terminal.innerHTML = "";
            lastQueryResult =[];
            lastDomain = domain;
            lastType = type;

            try {
                // Menggunakan Google DoH (DNS over HTTPS) API
                const response = await fetch(`https://dns.google/resolve?name=${domain}&type=${type}`);
                const data = await response.json();

                let outputHtml = `<span class="text-blue-400">; <<>> MARK_Tools DNS Resolver <<>> ${domain} ${type}</span>\n`;
                outputHtml += `<span class="text-slate-500">;; global options: +cmd</span>\n\n`;

                if (data.Status === 0) { // Sukses
                    outputHtml += `<span class="text-green-400">;; Got answer:</span>\n`;
                    outputHtml += `<span class="text-slate-500">;; ->>HEADER<<- opcode: QUERY, status: NOERROR</span>\n\n`;

                    if (data.Answer && data.Answer.length > 0) {
                        outputHtml += `<span class="text-yellow-400">;; ANSWER SECTION:</span>\n`;
                        
                        // Menata Output seperti command 'dig' di Linux
                        data.Answer.forEach(ans => {
                            const recType = typeMap[ans.type] || ans.type;
                            // Format: DOMAIN.  TTL  IN  TYPE  DATA
                            const line = `${ans.name.padEnd(25)} ${ans.TTL.toString().padEnd(7)} IN\t${recType.toString().padEnd(5)}\t${ans.data}`;
                            outputHtml += `<span>${line}</span>\n`;
                            
                            // Save for Export
                            lastQueryResult.push([ans.name, ans.TTL.toString(), recType, ans.data]);
                        });
                    } else {
                        outputHtml += `<span class="text-red-400">;; No records found for this type.</span>\n`;
                    }

                    if (data.Authority) {
                        outputHtml += `\n<span class="text-yellow-400">;; AUTHORITY SECTION:</span>\n`;
                        data.Authority.forEach(ans => {
                            const recType = typeMap[ans.type] || ans.type;
                            outputHtml += `<span>${ans.name.padEnd(25)} ${ans.TTL.toString().padEnd(7)} IN\t${recType.toString().padEnd(5)}\t${ans.data}</span>\n`;
                        });
                    }

                } else if (data.Status === 3) {
                    outputHtml += `<span class="text-red-400">;; ->>HEADER<<- status: NXDOMAIN (Domain does not exist)</span>\n`;
                } else {
                    outputHtml += `<span class="text-red-400">;; ->>HEADER<<- status: ERROR (Code ${data.Status})</span>\n`;
                }

                outputHtml += `\n<span class="text-slate-500">;; Query time: ${Math.floor(Math.random() * 50 + 10)} msec</span>\n`;
                outputHtml += `<span class="text-slate-500">;; SERVER: 8.8.8.8#53(dns.google)</span>\n`;
                outputHtml += `<span class="text-slate-500">;; WHEN: ${new Date().toUTCString()}</span>\n`;

                terminal.innerHTML = outputHtml;

            } catch (error) {
                terminal.innerHTML = `<span class="text-red-500">Error connecting to DNS server: ${error.message}</span>`;
            } finally {
                loading.classList.add('hidden');
            }
        }

        // --- EXPORT PDF & WORD ---
        async function exportReport(format) {
            if (lastQueryResult.length === 0) return alert("Belum ada data (atau data kosong) untuk diexport!");

            const btnPdf = document.getElementById('btnExportPdf');
            const btnWord = document.getElementById('btnExportWord');
            btnPdf.disabled = true; btnWord.disabled = true;

            let finalBlob, finalFileName;

            try {
                if (format === 'pdf') {
                    const { jsPDF } = window.jspdf;
                    const doc = new jsPDF('l', 'mm', 'a4'); // Landscape so data fits
                    
                    doc.setFont("courier", "bold");
                    doc.setFontSize(18);
                    doc.text("DNS LOOKUP REPORT", 14, 20);
                    doc.setFontSize(11);
                    doc.setFont("courier", "normal");
                    doc.text(`Domain : ${lastDomain}`, 14, 30);
                    doc.text(`Type   : ${lastType}`, 14, 36);
                    doc.text(`Date   : ${new Date().toLocaleString()}`, 14, 42);

                    doc.autoTable({
                        startY: 50,
                        head: [['Domain Name', 'TTL', 'Type', 'Record Data']],
                        body: lastQueryResult,
                        theme: 'grid',
                        styles: { font: 'courier', fontSize: 9, cellPadding: 3, overflow: 'linebreak' },
                        columnStyles: { 3: { cellWidth: 150 } }, // Provide wide space for TXT/DKIM record
                        headStyles: { fillColor:[56, 189, 248] } // Blue 400
                    });

                    finalBlob = doc.output('blob');
                    finalFileName = `DNS_${lastDomain}_${lastType}.pdf`;

                } else if (format === 'word') {
                    if (typeof window.docx === 'undefined') return alert("Library docx belum siap.");

                    const tableRows =[
                        new window.docx.TableRow({
                            tableHeader: true,
                            children: ['Domain Name', 'TTL', 'Type', 'Record Data'].map(text => 
                                new window.docx.TableCell({ 
                                    children:[new window.docx.Paragraph({text: text, bold: true})], 
                                    shading: { fill: "38bdf8" } 
                                })
                            )
                        }),
                        ...lastQueryResult.map(row => new window.docx.TableRow({
                            children: row.map(text => new window.docx.TableCell({ children:[new window.docx.Paragraph(text.toString())] }))
                        }))
                    ];

                    const docWord = new window.docx.Document({
                        sections:[{
                            properties: { page: { size: { orientation: window.docx.PageOrientation.LANDSCAPE } } },
                            children: [
                                new window.docx.Paragraph({ children:[new window.docx.TextRun({ text: "DNS LOOKUP REPORT", bold: true, size: 32 })], spacing: { after: 400 } }),
                                new window.docx.Paragraph({ text: `Domain : ${lastDomain}` }),
                                new window.docx.Paragraph({ text: `Type   : ${lastType}` }),
                                new window.docx.Paragraph({ text: `Date   : ${new Date().toLocaleString()}`, spacing: { after: 400 } }),
                                new window.docx.Table({
                                    width: { size: 100, type: window.docx.WidthType.PERCENTAGE },
                                    rows: tableRows
                                })
                            ]
                        }]
                    });

                    finalBlob = await window.docx.Packer.toBlob(docWord);
                    finalFileName = `DNS_${lastDomain}_${lastType}.docx`;
                }

                // History & Redirect
                if (typeof addToHistory === 'function') {
                    const historyId = await addToHistory('DNS Lookup', finalFileName, finalBlob);
                    window.location.href = `../go.html?id=${historyId}`;
                } else {
                    saveFile(URL.createObjectURL(finalBlob), finalFileName);
                }

            } catch(e) {
                alert("Export gagal: " + e.message);
            } finally {
                btnPdf.disabled = false; btnWord.disabled = false;
            }
        }
    </script>
</body>
</html>
