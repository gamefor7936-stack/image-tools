<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Doc Scanner Pro - MARK_Tools</title>
    <meta name="description" content="Free online document scanner. Deskew, auto-crop, and apply B&W filters to turn photos into clean A4 PDFs. No app installation needed.">
    <link rel="icon" type="image/png" href="../favicon.png">
    <link rel="apple-touch-icon" href="../favicon.png">
    <meta property="og:image" content="https://marktoolbox.com/favicon.png">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="../js/main.js"></script>
    <script src="../js/history.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script async src="https://docs.opencv.org/4.5.4/opencv.js" type="text/javascript"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap');

        body {
            font-family: 'Inter', sans-serif;
        }

        .corner-handle {
            width: 30px;
            height: 30px;
            background: white;
            border: 4px solid #3b82f6;
            border-radius: 50%;
            position: absolute;
            transform: translate(-50%, -50%);
            cursor: move;
            z-index: 60;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.5);
        }

        .mid-handle {
            width: 40px;
            height: 12px;
            background: #3b82f6;
            border: 2px solid white;
            border-radius: 6px;
            position: absolute;
            transform: translate(-50%, -50%);
            cursor: move;
            z-index: 50;
        }

        .scanner-header-select {
            background-color: rgb(79 70 229 / 0.45);
            border: 1px solid rgb(199 210 254 / 0.35);
            color: white;
            font-size: 0.75rem;
            font-weight: 700;
            border-radius: 0.5rem;
            padding: 0.5rem 0.75rem;
            outline: none;
        }

        .scanner-header-select option {
            color: #0f172a;
            background: #fff;
        }

        .scanner-header-input {
            background-color: rgb(79 70 229 / 0.45);
            border: 1px solid rgb(199 210 254 / 0.35);
            color: white;
            font-size: 0.75rem;
            border-radius: 0.5rem;
            padding: 0.5rem 0.5rem;
            width: 4.5rem;
            outline: none;
        }

        .scanner-header-input::placeholder {
            color: rgb(224 231 255 / 0.6);
        }
    </style>
</head>

<body class="bg-[#f3f4f9] text-slate-900 flex flex-col min-h-screen">

    <header class="bg-indigo-700 text-white px-6 py-4 shadow-lg shadow-indigo-200 shrink-0">
        <div class="flex flex-wrap items-center gap-x-4 gap-y-3">
            <div class="flex items-center gap-3 shrink-0">
                <a class="font-black text-xl tracking-tighter text-white hover:text-indigo-100 transition"
                    href="/">MARK_Tools</a>
                <span class="bg-indigo-500 text-[10px] px-2 py-0.5 rounded-full font-bold">DOC SCANNER</span>
            </div>

            <div class="flex flex-wrap items-center gap-3 flex-1 min-w-0 justify-end">
                <select id="filterMode" onchange="scheduleLivePreview()" class="scanner-header-select">
                    <option value="bw" selected>B&amp;W Document</option>
                    <option value="magic">Magic Color</option>
                    <option value="original">Original</option>
                </select>

                <select id="paperSize" onchange="toggleCustomSize()" class="scanner-header-select">
                    <option value="a4" selected>A4 (210×297 mm)</option>
                    <option value="letter">Letter (216×279 mm)</option>
                    <option value="legal">Legal (216×356 mm)</option>
                    <option value="custom">Custom</option>
                </select>

                <select id="fitMode" class="scanner-header-select">
                    <option value="fit" selected>Fit to paper</option>
                    <option value="stretch">Stretch to paper</option>
                </select>

                <div id="customSizeInputs" style="display: none;"
                    class="flex flex-wrap items-center gap-2 text-xs text-indigo-100">
                    <input type="number" id="customWidth" placeholder="W" min="1" value="210"
                        class="scanner-header-input" title="Width (mm)"> <span class="opacity-80">mm</span>
                    <input type="number" id="customHeight" placeholder="H" min="1" value="297"
                        class="scanner-header-input" title="Height (mm)"> <span class="opacity-80">mm</span>
                </div>

                <div class="flex items-center gap-2 text-xs text-indigo-100 whitespace-nowrap">
                    <span class="font-semibold opacity-90">Strength</span>
                    <input type="range" id="scanStrength" min="0" max="100" value="50" class="w-24 md:w-28 accent-white"
                        oninput="scheduleLivePreview()">
                </div>

                <a class="bg-indigo-600 text-white px-4 py-2 rounded-lg text-sm font-bold shadow-md hover:bg-indigo-500 transition-all flex items-center gap-2 shrink-0"
                    href="/">
                    <svg class="h-4 w-4" fill="none" stroke="currentColor" viewbox="0 0 24 24"
                        xmlns="http://www.w3.org/2000/svg">
                        <path d="M15 19l-7-7 7-7" stroke-linecap="round" stroke-linejoin="round" stroke-width="2">
                        </path>
                    </svg>
                    Back
                </a>

                <button type="button" onclick="generateFinalPDF()" id="dlBtn2"
                    class="bg-white text-indigo-700 px-5 py-2 rounded-lg text-sm font-bold shadow-md hover:bg-indigo-50 transition-all disabled:opacity-50 disabled:cursor-not-allowed shrink-0">
                    Save as PDF
                </button>
            </div>
        </div>
    </header>

    <div class="flex flex-col lg:flex-row flex-1 min-h-0 bg-[#121212] text-white overflow-hidden">

        <aside class="w-full lg:w-72 bg-[#1e1e1e] border-r border-white/10 flex flex-col overflow-y-auto shrink-0">
            <div class="p-4 border-b border-white/10">
                <h4 class="text-[10px] font-black text-slate-500 uppercase tracking-widest mb-4">Scan pages</h4>
                <div id="pageList" class="grid grid-cols-3 lg:grid-cols-1 gap-3"></div>
                <label
                    class="mt-4 w-full h-20 border-2 border-dashed border-indigo-500/30 rounded-xl flex flex-col items-center justify-center cursor-pointer hover:bg-indigo-500/10 transition-all">
                    <input type="file" id="imageInput" class="hidden" accept="image/*" multiple
                        onchange="handleBulkUpload(this)">
                    <span class="text-xl text-indigo-400">+</span>
                </label>
            </div>
            <div class="p-4 flex-grow">
                <h4 class="text-[10px] font-black text-slate-500 uppercase tracking-widest mb-4">Recent history</h4>
                <div id="historyList" class="space-y-2"></div>
            </div>
        </aside>

        <main class="flex-grow flex flex-col relative min-h-0 overflow-auto">

            <div id="scannerContainer" class="w-full max-w-5xl mx-auto flex flex-col p-6">
                <div class="bg-white/5 p-3 rounded-2xl mb-4 flex flex-wrap items-center gap-4">
                    <div class="flex gap-2 ml-auto">
                        <button id="btnReCrop" onclick="switchMode('crop')"
                            class="hidden bg-slate-200 text-slate-700 px-6 py-2 rounded-xl text-[10px] font-black uppercase hover:bg-slate-300 transition-all">
                            Edit crop
                        </button>
                        <button id="btnApply" onclick="processPreview()"
                            class="bg-emerald-500 text-white px-6 py-2 rounded-xl text-[10px] font-black uppercase hover:bg-emerald-600 transition-all shadow-md">
                            Apply &amp; preview
                        </button>
                    </div>
                </div>

                <div class="relative w-full bg-[#181818] rounded-3xl overflow-hidden flex items-center justify-center border-4 border-white/20 shadow-2xl min-h-[60vh]"
                    id="editorViewport">
                    <div id="cropLayer" class="relative inline-block">
                        <canvas id="srcCanvas" class="max-w-full max-h-[70vh] block"></canvas>
                        <div id="cropOverlay" class="absolute inset-0 touch-none select-none">
                            <svg class="w-full h-full absolute inset-0 pointer-events-none" id="svgGuide">
                                <defs>
                                    <mask id="cropMask">
                                        <rect width="100%" height="100%" fill="white" />
                                        <polygon id="cropMaskPolygon" points="" fill="black" />
                                    </mask>
                                </defs>
                                <rect width="100%" height="100%" fill="rgba(0,0,0,0.6)" mask="url(#cropMask)" />
                                <polygon id="cropLines" points="" fill="rgba(79,70,229,0.2)" stroke="#4f46e5"
                                    stroke-width="3" />
                            </svg>
                            <div class="corner-handle" id="h0"></div>
                            <div class="corner-handle" id="h1"></div>
                            <div class="corner-handle" id="h2"></div>
                            <div class="corner-handle" id="h3"></div>
                        </div>
                    </div>

                    <div id="resultLayer" class="hidden relative max-w-full max-h-[70vh] p-4">
                        <img id="resultPreview" class="shadow-2xl max-w-full max-h-[70vh] border border-white/20">
                    </div>

                    <div id="procLoading"
                        class="hidden absolute inset-0 bg-black/80 backdrop-blur-sm z-[200] flex flex-col items-center justify-center">
                        <div
                            class="w-12 h-12 border-4 border-indigo-500 border-t-transparent rounded-full animate-spin mb-4">
                        </div>
                        <p class="text-xs font-black uppercase tracking-[0.2em] text-white">Processing…</p>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script src="../js/doc-scanner.js"></script>
</body>

</html>
