<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SEO Word Counter & Keyword Density - MARK_Tools</title>
    <meta name="description" content="Advanced SEO Word Counter. Analyze your article's keyword density, character count, and reading time to optimize your content for search engines.">
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24'%3E%3Crect width='24' height='24' rx='6' fill='%232563eb'/%3E%3Cpath d='M4 19V5l8 8 8-8v14' stroke='white' stroke-width='3' stroke-linecap='round' stroke-linejoin='round'/%3E%3C/svg%3E">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="../js/main.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; }
        .glass-dark { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.05); }
        .term-input { background: #0f172a; border: 1px solid #334155; color: #10b981; transition: all 0.3s; }
        .term-input:focus { border-color: #10b981; outline: none; }
    </style>
</head>
<body class="bg-[#0b1120] text-slate-300 font-sans min-h-screen flex flex-col">

    <nav class="bg-[#0f172a]/80 backdrop-blur-md sticky top-0 z-50 border-b border-slate-800">
        <div class="container mx-auto px-6 h-16 flex justify-between items-center">
            <a href="/" class="text-emerald-500 font-black text-xl tracking-tighter">MARK_Tools | SEO</a>
            <a href="/" class="text-xs font-bold text-slate-400 hover:text-emerald-400">BACK TO HOME</a>
        </div>
    </nav>

    <main class="container mx-auto px-4 py-8 flex-grow flex flex-col lg:flex-row gap-6">
        
        <!-- LEFT COLUMN: INPUT TEXTAREA -->
        <div class="w-full lg:w-3/5 flex flex-col gap-4">
            <div class="flex items-center gap-3">
                <div class="w-10 h-10 bg-emerald-500/20 text-emerald-400 rounded-lg flex items-center justify-center">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z" /></svg>
                </div>
                <div>
                    <h1 class="text-lg font-bold text-white">SEO Text Analyzer</h1>
                    <p class="text-[10px] text-slate-400 uppercase tracking-widest">Word Count & Density</p>
                </div>
            </div>

            <textarea id="textInput" class="w-full flex-grow min-h-[400px] p-6 rounded-3xl term-input text-sm leading-relaxed" placeholder="Paste your article or text here to analyze..." oninput="analyzeText()"></textarea>
            
            <div class="flex gap-2">
                <button onclick="document.getElementById('textInput').value=''; analyzeText();" class="px-6 py-3 bg-slate-800 text-slate-400 rounded-xl text-xs font-bold hover:bg-slate-700 transition">Clear Text</button>
                <button onclick="copyContent()" class="px-6 py-3 bg-emerald-600 text-white rounded-xl text-xs font-bold hover:bg-emerald-500 transition shadow-lg ml-auto">Copy Text</button>
            </div>
        </div>

        <!-- RIGHT COLUMN: STATISTICS -->
        <div class="w-full lg:w-2/5 glass-dark rounded-3xl p-6 flex flex-col border-t-4 border-t-emerald-500">
            
            <h3 class="text-xl font-bold text-white mb-6 border-b border-slate-700 pb-4">Basic Metrics</h3>

            <div class="grid grid-cols-2 gap-4 mb-8 text-center">
                <div class="bg-[#020617] p-4 rounded-2xl border border-slate-800">
                    <p class="text-3xl font-black text-emerald-400" id="statWords">0</p>
                    <p class="text-[10px] font-bold text-slate-500 uppercase tracking-widest mt-1">Words</p>
                </div>
                <div class="bg-[#020617] p-4 rounded-2xl border border-slate-800">
                    <p class="text-3xl font-black text-white" id="statChars">0</p>
                    <p class="text-[10px] font-bold text-slate-500 uppercase tracking-widest mt-1">Characters</p>
                </div>
                <div class="bg-[#020617] p-4 rounded-2xl border border-slate-800">
                    <p class="text-3xl font-black text-white" id="statSentences">0</p>
                    <p class="text-[10px] font-bold text-slate-500 uppercase tracking-widest mt-1">Sentences</p>
                </div>
                <div class="bg-[#020617] p-4 rounded-2xl border border-slate-800">
                    <p class="text-3xl font-black text-emerald-400" id="statReadTime">0m</p>
                    <p class="text-[10px] font-bold text-slate-500 uppercase tracking-widest mt-1">Reading Time</p>
                </div>
            </div>

            <div class="flex justify-between items-end border-b border-slate-700 pb-4 mb-4 mt-4">
                <h3 class="text-xl font-bold text-white">Keyword Density</h3>
                <span class="text-[10px] font-bold text-slate-500 uppercase">Top 10 Words</span>
            </div>

            <!-- Area Density Bar -->
            <div id="densityList" class="flex-grow overflow-y-auto space-y-3 pr-2">
                <div class="text-center text-slate-500 text-sm mt-10 italic">Start typing to see keyword density analysis.</div>
            </div>

        </div>
    </main>

    <script>
        // Stopwords standar (kata yang diabaikan dalam SEO)
        const stopWords =['the', 'a', 'an', 'and', 'or', 'but', 'is', 'are', 'was', 'were', 'in', 'on', 'at', 'to', 'for', 'of', 'with', 'by', 'as', 'it', 'this', 'that', 'these', 'those', 'i', 'you', 'he', 'she', 'we', 'they', 'yang', 'di', 'ke', 'dari', 'dan', 'atau', 'ini', 'itu', 'adalah', 'untuk', 'dengan', 'pada', 'akan'];

        function analyzeText() {
            const text = document.getElementById('textInput').value;
            
            // Basic Metrics
            const chars = text.length;
            const words = text.trim() === '' ? 0 : text.trim().split(/\s+/).length;
            const sentences = text.trim() === '' ? 0 : text.split(/[.!?]+/).filter(Boolean).length;
            const readTime = Math.ceil(words / 200); // Avg reading speed: 200 wpm

            document.getElementById('statChars').innerText = chars.toLocaleString();
            document.getElementById('statWords').innerText = words.toLocaleString();
            document.getElementById('statSentences').innerText = sentences.toLocaleString();
            document.getElementById('statReadTime').innerText = readTime + "m";

            // Keyword Density Logic
            if (words === 0) {
                document.getElementById('densityList').innerHTML = '<div class="text-center text-slate-500 text-sm mt-10 italic">Start typing to see keyword density analysis.</div>';
                return;
            }

            // Clean text from punctuation & make lowercase
            const cleanText = text.toLowerCase().replace(/[^\w\s\u00C0-\u017F]/g, '');
            const wordList = cleanText.split(/\s+/).filter(w => w.length > 2 && !stopWords.includes(w));
            
            // Hitung frekuensi kata
            const wordCounts = {};
            wordList.forEach(w => {
                wordCounts[w] = (wordCounts[w] || 0) + 1;
            });

            // Sort from most frequent and take Top 10
            const sortedWords = Object.entries(wordCounts)
                .sort((a, b) => b[1] - a[1])
                .slice(0, 10);

            // Render Progress Bar UI
            const densityContainer = document.getElementById('densityList');
            densityContainer.innerHTML = "";

            if(sortedWords.length === 0) return;

            const maxCount = sortedWords[0][1]; // Untuk hitung persentase bar

            sortedWords.forEach(item => {
                const word = item[0];
                const count = item[1];
                const percent = ((count / wordList.length) * 100).toFixed(1);
                const barWidth = (count / maxCount) * 100;

                densityContainer.innerHTML += `
                    <div>
                        <div class="flex justify-between text-xs font-bold mb-1">
                            <span class="text-slate-300 capitalize">${word}</span>
                            <span class="text-emerald-400">${count}x <span class="text-slate-500 font-normal">(${percent}%)</span></span>
                        </div>
                        <div class="w-full bg-[#020617] rounded-full h-1.5 overflow-hidden">
                            <div class="bg-emerald-500 h-1.5 rounded-full" style="width: ${barWidth}%"></div>
                        </div>
                    </div>
                `;
            });
        }

        function copyContent() {
            const el = document.getElementById('textInput');
            el.select();
            navigator.clipboard.writeText(el.value);
            alert("Text copied successfully!");
        }
    </script>
</body>
</html>
