<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <title>EXIF REMOVER - MARK_Tools</title>
    <meta name="description" content="Protect your privacy by removing hidden EXIF metadata (GPS location, camera info) from your photos before sharing them online. Free and secure.">
    <link rel="icon" type="image/svg+xml"
        href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24'%3E%3Crect width='24' height='24' rx='6' fill='%232563eb'/%3E%3Cpath d='M4 19V5l8 8 8-8v14' stroke='white' stroke-width='3' stroke-linecap='round' stroke-linejoin='round'/%3E%3C/svg%3E">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="../js/history.js"></script>
</head>

<body class="bg-gray-50 p-6">
    <div class="max-w-xl mx-auto">
        <a class="text-blue-500 text-sm mb-4 inline-block hover:underline font-medium" href="../index.html">← Back to
            home</a>

        <div class="bg-white p-6 rounded-xl shadow-md border border-gray-100">
            <div class="mb-4 text-blue-800">
                <svg class="h-10 w-10" fill="none" stroke="currentColor" viewBox="0 0 24 24"
                    xmlns="http://www.w3.org/2000/svg">
                    <path
                        d="M13.875 18.825A10.05 10.05 0 0112 19c-4.478 0-8.268-2.943-9.543-7a9.97 9.97 0 011.563-3.029m5.858.908a3 3 0 114.243 4.243M9.878 9.878l4.242 4.242M9.882 9.882L4.99 4.99m14.122 14.122l-4.99-4.99"
                        stroke-linecap="round" stroke-linejoin="round" stroke-width="2"></path>
                </svg>
            </div>

            <h3 class="text-xl font-semibold mb-2">Exif Privacy Remover</h3>
            <p class="text-[10px] text-gray-500 mb-4 uppercase tracking-widest">Strip EXIF metadata (GPS, camera model,
                timestamps) for safer sharing.</p>

            <input accept="image/*"
                class="block w-full text-sm mb-6 file:mr-4 file:py-2 file:px-4 file:rounded-lg file:border-0 file:text-sm file:font-semibold file:bg-blue-50 file:text-blue-800 hover:file:bg-blue-100 cursor-pointer text-slate-500"
                id="exifInput" type="file" />

            <button
                class="w-full bg-blue-800 text-white py-3.5 rounded-xl font-bold hover:bg-blue-900 transition-all shadow-lg shadow-blue-900/30 disabled:opacity-50"
                id="exifBtn" onclick="removeExif()">
                Remove Metadata & Save
            </button>
        </div>

        <section class="mt-12">
            <div class="flex items-center gap-2 mb-4 px-4">
                <svg class="h-5 w-5 text-slate-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"
                    xmlns="http://www.w3.org/2000/svg">
                    <path d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z" stroke-linecap="round" stroke-linejoin="round"
                        stroke-width="2"></path>
                </svg>
                <h3 class="font-bold text-slate-700 uppercase tracking-widest text-[10px]">Recent history</h3>
            </div>
            <div class="bg-white p-6 rounded-3xl border border-slate-200 shadow-sm" id="historyList"></div>
        </section>
    </div>

    <script>
        async function removeExif() {
            const input = document.getElementById('exifInput');
            const btn = document.getElementById('exifBtn');
            if (!input.files[0]) return alert("Choose a photo first.");

            btn.disabled = true;
            btn.innerText = "STRIPPING METADATA...";

            const file = input.files[0];
            const img = new Image();
            const reader = new FileReader();

            reader.onload = (e) => {
                img.src = e.target.result;
                img.onload = () => {
                    const canvas = document.createElement('canvas');
                    canvas.width = img.width;
                    canvas.height = img.height;
                    const ctx = canvas.getContext('2d');

                    // Menggambar ke canvas secara otomatis menghilangkan EXIF data
                    ctx.drawImage(img, 0, 0);

                    canvas.toBlob(async (blob) => {
                        const fileName = `Cleaned_${file.name}`;

                        try {
                            // Cukup 1 baris ini untuk menyimpan ke history & lempar ke go.html
                            await processRedirect('Exif Privacy Remover', fileName, blob);
                            return; // Paksa berhenti di sini agar tidak ada yang error
                        } catch (err) {
                            console.error(err);
                            alert("Gagal memproses gambar.");
                        } finally {
                            // Ini hanya dijalankan kalau redirectnya somehow gagal
                            btn.disabled = false;
                            btn.innerText = "Remove Metadata & Save";
                        }
                    }, 'image/jpeg', 0.95);
                };
            };
            reader.readAsDataURL(file);
        }

        window.onload = () => {
            if (typeof renderHistoryUI === 'function') renderHistoryUI('Exif Privacy Remover');
        };
    </script>
    <script src="../js/main.js"></script>
</body>

</html>
