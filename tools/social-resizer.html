<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Social Media Image Resizer - MARK_Tools</title>
    <meta name="description" content="Auto-crop and resize your photos for Instagram, YouTube, and Facebook in one click. Download all social media sizes packed in a single ZIP file.">
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24'%3E%3Crect width='24' height='24' rx='6' fill='%232563eb'/%3E%3Cpath d='M4 19V5l8 8 8-8v14' stroke='white' stroke-width='3' stroke-linecap='round' stroke-linejoin='round'/%3E%3C/svg%3E">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="../js/main.js"></script>
    <script src="../js/history.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
</head>
<body class="bg-slate-50 p-6">
    <div class="max-w-3xl mx-auto">
        <a href="/" class="text-blue-600 text-sm mb-4 inline-block">← Back to home</a>
        
        <div class="bg-white p-8 rounded-3xl shadow-xl border border-slate-200">
            <h2 class="text-2xl font-bold mb-2 text-slate-800">Social Media Resizer</h2>
            <p class="text-xs text-slate-500 mb-8 text-balance uppercase tracking-widest font-bold">One photo → common social sizes (center crop)</p>

            <div class="mb-8">
                <input type="file" id="imageInput" accept="image/*" class="block w-full text-sm text-slate-500 file:mr-4 file:py-3 file:px-6 file:rounded-2xl file:border-0 file:text-sm file:font-bold file:bg-blue-50 file:text-blue-700 hover:file:bg-blue-100 transition-all cursor-pointer">
            </div>

            <div class="grid grid-cols-2 md:grid-cols-4 gap-2 mb-8">
                <div class="p-3 border rounded-xl text-center bg-slate-50">
                    <p class="text-[9px] font-bold text-slate-400">IG POST</p>
                    <p class="text-[10px]">1080 × 1080</p>
                </div>
                <div class="p-3 border rounded-xl text-center bg-slate-50">
                    <p class="text-[9px] font-bold text-slate-400">IG STORY</p>
                    <p class="text-[10px]">1080 × 1920</p>
                </div>
                <div class="p-3 border rounded-xl text-center bg-slate-50">
                    <p class="text-[9px] font-bold text-slate-400">YT THUMB</p>
                    <p class="text-[10px]">1280 × 720</p>
                </div>
                <div class="p-3 border rounded-xl text-center bg-slate-50">
                    <p class="text-[9px] font-bold text-slate-400">FB POST</p>
                    <p class="text-[10px]">1200 × 630</p>
                </div>
            </div>

            <button onclick="resizeSocial()" id="resizeBtn" class="w-full bg-blue-600 text-white py-4 rounded-2xl font-bold shadow-lg hover:bg-blue-700 transition-all">
                Process &amp; download all (ZIP)
            </button>
        </div>

        <section class="mt-12">
            <h3 class="font-bold text-slate-700 mb-4 px-4">Recent resizer history</h3>
            <div id="historyList" class="bg-white p-6 rounded-3xl border border-slate-200 shadow-sm"></div>
        </section>
    </div>

    <script>
        window.onload = () => renderHistoryUI('Social Resizer');

        const SIZES = [
            { name: 'Instagram_Post', w: 1080, h: 1080 },
            { name: 'Instagram_Story', w: 1080, h: 1920 },
            { name: 'YouTube_Thumbnail', w: 1280, h: 720 },
            { name: 'Facebook_Post', w: 1200, h: 630 }
        ];

        async function resizeSocial() {
            const file = document.getElementById('imageInput').files[0];
            const btn = document.getElementById('resizeBtn');
            if(!file) return alert("Choose a photo first.");

            btn.disabled = true;
            btn.innerText = "Processing images…";

            try {
                const zip = new JSZip();
                const img = await loadImage(file);

                for (const size of SIZES) {
                    const canvas = document.createElement('canvas');
                    canvas.width = size.w;
                    canvas.height = size.h;
                    const ctx = canvas.getContext('2d');

                    const ratio = Math.max(size.w / img.width, size.h / img.height);
                    const x = (size.w - img.width * ratio) / 2;
                    const y = (size.h - img.height * ratio) / 2;
                    ctx.drawImage(img, x, y, img.width * ratio, img.height * ratio);

                    const blob = await new Promise(res => canvas.toBlob(res, 'image/jpeg', 0.9));
                    zip.file(`${size.name}.jpg`, blob);
                }

                const zipBlob = await zip.generateAsync({type: "blob"});
                const finalFileName = `Social_Pack_${file.name.split('.')[0]}.zip`;

                if (typeof addToHistory === 'function') {
                    const historyId = await addToHistory('Social Resizer', finalFileName, zipBlob);
                    window.location.href = `../go.html?id=${historyId}`;
                } else {
                    saveFile(URL.createObjectURL(zipBlob), finalFileName);
                }

            } catch (error) {
                alert("Could not process the image.");
                btn.disabled = false;
                btn.innerText = "Process & download all (ZIP)";
            }
        }

        function loadImage(file) {
            return new Promise((resolve) => {
                const img = new Image();
                img.onload = () => resolve(img);
                img.src = URL.createObjectURL(file);
            });
        }
    </script>
</body>
</html>
