<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="utf-8"/>
<title>Image Compressor - MARK_Tools</title>
<meta name="description" content="Compress JPEG, PNG, and WebP images to reduce file size without losing quality. Fast, free, and secure in-browser image optimizer.">
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24'%3E%3Crect width='24' height='24' rx='6' fill='%232563eb'/%3E%3Cpath d='M4 19V5l8 8 8-8v14' stroke='white' stroke-width='3' stroke-linecap='round' stroke-linejoin='round'/%3E%3C/svg%3E">
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdn.jsdelivr.net/npm/browser-image-compression@2.0.1/dist/browser-image-compression.js"></script>
<script src="../js/history.js"></script>
</head>
<body class="bg-gray-50 p-6">
<div class="max-w-xl mx-auto">
<a class="text-blue-500 text-sm mb-4 inline-block" href="/">← Back to home</a>
<div class="bg-white p-6 rounded-xl shadow-md">
<div class="mb-4 text-green-500">
<svg class="h-10 w-10" fill="none" stroke="currentColor" viewbox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"></path></svg>
</div>
<h3 class="text-xl font-semibold mb-2">Image Compressor</h3>
<input accept="image/*" class="block w-full text-sm mb-4" id="compressInput" type="file"/>
<div class="mb-4">
<label class="block text-sm font-medium text-gray-700">Target max size (lower = smaller file)</label>
<input class="w-full h-2 bg-gray-200 rounded-lg appearance-none cursor-pointer" id="qualityThreshold" max="1.0" min="0.1" step="0.1" type="range" value="0.7"/>
<div class="flex justify-between text-xs text-gray-500">
<span>Smaller file</span>
<span>Higher quality</span>
</div>
</div>
<button class="w-full bg-green-600 text-white py-2 rounded-lg hover:bg-green-700" id="compressBtn" onclick="compressImage()">Compress &amp; download</button>
</div>
<section class="mt-12">
<div class="flex items-center gap-2 mb-4 px-4">
<svg class="h-5 w-5 text-slate-400" fill="none" stroke="currentColor" viewbox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"></path></svg>
<h3 class="font-bold text-slate-700">Recent history</h3>
</div>
<div class="bg-white p-6 rounded-3xl border border-slate-200 shadow-sm" id="historyList">
</div>
</section>
</div>
<script>
        async function compressImage() {
            const fileInput = document.getElementById('compressInput');
            const qualityValue = document.getElementById('qualityThreshold').value;
            const btn = document.getElementById('compressBtn');
            const imageFile = fileInput.files[0];

            if (!imageFile) return alert("Choose an image first.");

            btn.innerText = "Compressing…";
            btn.disabled = true;

            const options = {
                maxSizeMB: qualityValue,
                maxWidthOrHeight: 1920,
                useWebWorker: true,
                initialQuality: parseFloat(qualityValue)
            };

            try {
                const compressedFile = await imageCompression(imageFile, options);
                const fileName = `compressed_${imageFile.name}`;
                if (typeof addToHistory === 'function') {
                    const historyId = await addToHistory('Image Compressor', fileName, compressedFile);
                    window.location.href = `../go.html?id=${historyId}`;
                } else {
                    saveFile(URL.createObjectURL(compressedFile), fileName);
                }
            } catch (error) {
                alert("Compression failed: " + error.message);
            } finally {
                btn.innerText = "Compress & download";
                btn.disabled = false;
            }
        }

        window.onload = () => {
            renderHistoryUI('Image Compressor');
        };
    </script>
<script src="../js/main.js"></script></body>
</html>
