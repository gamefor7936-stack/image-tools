<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>Secure Download Gateway — MARK_Tools</title>
    <!-- Fix Favicon 404 -->
    <link rel="icon" type="image/png" href="/favicon.png">
    <link rel="apple-touch-icon" href="/favicon.png">
    <meta property="og:image" content="https://marktoolbox.com/favicon.png">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="js/history.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&family=JetBrains+Mono:wght@700&display=swap');
        body { font-family: 'Inter', sans-serif; }
        .font-mono { font-family: 'JetBrains Mono', monospace; }
        .spinner-ring { border-top-color: #2563eb; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .glow-bg { position: absolute; width: 300px; height: 300px; background: #3b82f6; filter: blur(120px); opacity: 0.15; border-radius: 50%; z-index: -1; pointer-events: none; }
    </style>
</head>
<body class="bg-[#f8fafc] flex items-center justify-center min-h-screen py-10 relative overflow-x-hidden">

    <div class="glow-bg top-[10%] left-[-50px]"></div>
    <div class="glow-bg bottom-[10%] right-[-50px] bg-purple-500"></div>

    <div class="w-full max-w-[1400px] mx-auto flex flex-row items-center justify-center gap-8 px-4 z-10">

        <!-- KONTEN UTAMA -->
        <div class="max-w-2xl w-full bg-white rounded-[2rem] shadow-2xl border border-slate-100 p-6 md:p-12 text-center flex flex-col items-center">
            
            <div class="flex items-center gap-3 mb-8">
                <div class="w-8 h-8 bg-gradient-to-br from-blue-600 to-indigo-600 rounded-lg flex items-center justify-center shadow-md">
                    <span class="text-white font-black text-sm">M</span>
                </div>
                <h1 class="text-2xl font-black tracking-tighter text-slate-800">MARK<span class="text-blue-600">_Tools</span></h1>
            </div>

            <h2 class="text-2xl md:text-3xl font-extrabold text-slate-800 mb-3" id="mainTitle">Your file is almost ready</h2>
            
            <p class="text-slate-500 text-sm mb-8 flex items-center justify-center gap-2 bg-slate-50 px-4 py-2 rounded-full border border-slate-100">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4 text-slate-400" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z" /></svg>
                <span id="displayFileName" class="font-mono text-blue-600 font-bold truncate max-w-[250px] md:max-w-sm text-xs">Loading file...</span>
            </p>

            <div class="flex flex-col items-center justify-center mb-8">
                <div class="relative w-16 h-16 flex items-center justify-center mb-3">
                    <div class="absolute inset-0 border-4 border-slate-100 rounded-full"></div>
                    <div id="spinner" class="absolute inset-0 border-4 border-transparent spinner-ring rounded-full"></div>
                    <span id="countdown" class="text-xl font-black text-slate-800 font-mono">5</span>
                </div>
                <p id="statusText" class="text-[10px] font-bold text-slate-400 uppercase tracking-widest">Validating secure session...</p>
            </div>

            <div class="flex flex-col sm:flex-row justify-center gap-3 w-full mb-10">
                <button onclick="history.back()" id="btnBack" class="w-full sm:w-1/2 py-3.5 bg-white text-slate-600 border border-slate-200 rounded-xl font-bold hover:bg-slate-50 transition-all text-sm flex items-center justify-center gap-2">
                    <span id="btnBackText">Cancel</span>
                </button>
                <button onclick="triggerDownload()" id="btnDownload" class="w-full sm:w-1/2 py-3.5 bg-blue-600 text-white rounded-xl font-bold transition-all shadow-lg shadow-blue-500/30 flex items-center justify-center gap-2 disabled:opacity-50 disabled:cursor-not-allowed text-sm" disabled>
                    <span id="btnText">Please Wait...</span>
                </button>
            </div>

            <!-- IKLAN BAWAH -->
            <div class="w-full h-[250px] bg-slate-50 border-2 border-dashed border-slate-200 rounded-2xl flex flex-col items-center justify-center relative overflow-hidden">
                <span class="absolute top-2 left-3 text-[9px] font-black text-slate-400 uppercase tracking-widest">Advertisement</span>
            </div>
        </div>
    </div>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const fileId = urlParams.get('id'); // Get ID from URL
        let fileData = null;
        let timer = 5;
        let hasDownloaded = false;

        // Save referrer on first visit so Back button can reload tool page
        const toolReferrer = document.referrer || null;

        // 1. ADBLOCK DETECTION FUNCTION (Don't lose it!)
        async function detectAdBlock() {
            let adBait = document.createElement('div');
            adBait.innerHTML = '&nbsp;';
            adBait.className = 'adsbox ad-placement doubleclick ad-placeholder'; 
            adBait.style.position = 'absolute'; adBait.style.top = '-1000px';
            document.body.appendChild(adBait);
            await new Promise(r => setTimeout(r, 100));
            let isBlocked = (adBait.offsetHeight === 0 || window.getComputedStyle(adBait).display === 'none');
            adBait.remove();
            return isBlocked;
        }

        // 2. LOAD FILE FUNCTION
        async function loadFileData() {
            if (!fileId) {
                document.getElementById('mainTitle').innerText = "Link Invalid";
                return;
            }

            let result = null;
            let retries = 0;
            const maxRetries = 5;

            // Polling mechanism: Wait for data available in IndexedDB (anticipate race condition)
            while (retries < maxRetries) {
                try {
                    result = await getFileById(fileId);
                    if (result) break;
                } catch (err) {
                    console.error("Retry Error:", err);
                }
                retries++;
                console.log(`Retrying to find data... (${retries}/${maxRetries})`);
                await new Promise(r => setTimeout(r, 200)); // Wait 200ms per retry
            }

            if (result) {
                fileData = result;
                document.getElementById('displayFileName').innerText = result.name;
                checkAdBlockAndStart();
            } else {
                document.getElementById('mainTitle').innerText = "File Not Found";
                alert("File data not found or still being saved. Please refresh this page.");
            }
        }

        // 3. CHECK ADBLOCK & RUN TIMER
        async function checkAdBlockAndStart() {
            const isBlocked = await detectAdBlock(); 
            
            if (isBlocked) {
                document.getElementById('spinner').style.display = 'none';
                document.getElementById('countdown').innerHTML = `🛑`;
                document.getElementById('statusText').innerText = "ADBLOCKER DETECTED!";
                document.getElementById('statusText').classList.replace('text-slate-400', 'text-red-500');
                
                const btnDownload = document.getElementById('btnDownload');
                btnDownload.innerText = "Disable AdBlock to Continue";
                btnDownload.classList.replace('bg-blue-600', 'bg-red-500');
            } else {
                const interval = setInterval(() => {
                    timer--;
                    const countEl = document.getElementById('countdown');
                    if(countEl) countEl.innerText = timer;
                    
                    if (timer <= 0) {
                        clearInterval(interval);
                        
                        // Unlock History
                        if(typeof unlockHistoryItem === 'function') unlockHistoryItem(fileId);

                        finishUi();
                        if(!hasDownloaded) triggerDownload();
                    }
                }, 1000);
            }
        }

        function finishUi() {
            document.getElementById('spinner').style.display = 'none';
            document.getElementById('countdown').innerHTML = `<svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6 text-green-500" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="3"><path stroke-linecap="round" stroke-linejoin="round" d="M5 13l4 4L19 7" /></svg>`;
            document.getElementById('statusText').innerText = "File is ready!";
            document.getElementById('statusText').classList.replace('text-slate-400', 'text-green-500');
            document.getElementById('mainTitle').innerText = "Thank you for using MARK_Tools";
            document.getElementById('btnBackText').innerText = "Back to Tools";

            // Change Back button onclick: full navigation (reload) to original tool page
            // so history item appears UNLOCKED without manual refresh
            const btnBack = document.getElementById('btnBack');
            if (toolReferrer) {
                btnBack.onclick = () => { window.location.href = toolReferrer; };
            } else {
                // Fallback: history.back() + force reload after navigation
                btnBack.onclick = () => { history.go(-1); setTimeout(() => location.reload(), 300); };
            }

            const btnDownload = document.getElementById('btnDownload');
            btnDownload.disabled = false;
            document.getElementById('btnText').innerText = "Download Again";
            btnDownload.classList.replace('bg-blue-600', 'bg-green-500');
            btnDownload.classList.add('hover:bg-green-600');
        }

        function triggerDownload() {
            if (!fileData) return;
            hasDownloaded = true;
            try {
                const url = URL.createObjectURL(fileData.data);
                const link = document.createElement('a');
                link.href = url;
                link.download = fileData.name;
                document.body.appendChild(link);
                link.click();
                document.body.removeChild(link);
            } catch (e) { console.error(e); }
        }

        window.onload = loadFileData;
    </script>
</body>
</html>
